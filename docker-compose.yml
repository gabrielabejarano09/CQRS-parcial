version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dhabi_postgres
    restart: always
    environment:
      POSTGRES_DB: dhabi_notifications
      POSTGRES_USER: dhabi_user
      POSTGRES_PASSWORD: dhabi_pass123
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dhabi_user -d dhabi_notifications']
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6-jammy
    container_name: dhabi_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: dhabi_user
      MONGO_INITDB_ROOT_PASSWORD: dhabi_pass123
      MONGO_INITDB_DATABASE: dhabi_read
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
